<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Accounts | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/i18n.css" />
    <script defer src="/js/staff.js"></script>
    <script defer src="/js/i18n.js"></script>
    <script defer src="/js/theme.js"></script>
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div>
          <p class="eyebrow">Admin only</p>
          <h1>Staff accounts</h1>
          <p class="page-intro">Add assistant teachers and reset their passwords without exposing this to public registration.</p>
        </div>
        <div class="toolbar-actions">
          <a class="secondary-link" href="/dashboard">Dashboard</a>
          <form action="/logout" method="post">
            <button class="secondary-button" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <section class="content-grid">
        <article class="student-card">
          <h2>Add staff account</h2>
          <form class="login-form" id="staff-form">
            <label for="name">Name</label>
            <input id="name" name="name" required />

            <label for="email">Email / username</label>
            <input id="email" name="email" type="email" required />

            <label for="role">Role</label>
            <select id="role" name="role">
              <option value="Teacher">Assistant teacher</option>
              <option value="Administrator">Administrator</option>
            </select>

            <label for="password">Temporary password</label>
            <input id="password" name="password" type="password" minlength="6" required />

            <button type="submit">Create account</button>
            <p class="form-message" id="staff-message"></p>
          </form>
        </article>

        <article class="student-card">
          <h2>Existing staff</h2>
          <div class="student-list" id="staff-list"></div>
        </article>
      </section>
    </main>
  </body>
</html>
