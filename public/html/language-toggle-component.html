<!-- Language Toggle Component HTML -->
<div class="language-toggle" id="languageToggle">
  <button class="lang-btn" data-lang="en" id="langEn">English</button>
  <button class="lang-btn" data-lang="ar" id="langAr">العربية</button>
</div>

<script>
// Language Toggle Script
document.addEventListener('DOMContentLoaded', () => {
  const currentLang = localStorage.getItem('language') || 'en';
  
  // Set active button
  document.querySelectorAll('.lang-btn').forEach(btn => {
    if (btn.dataset.lang === currentLang) {
      btn.classList.add('active');
    }
  });

  // Add click handlers
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      i18n.setLanguage(lang);
    });
  });
});
</script>

<style>
.language-toggle {
  display: inline-flex;
  gap: 0;
  background: #f0f0f0;
  border-radius: 6px;
  padding: 4px;
  border: 1px solid #ddd;
}

.language-toggle .lang-btn {
  padding: 8px 16px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-weight: 500;
  font-size: 14px;
  color: #666;
  transition: all 0.3s ease;
  border-radius: 4px;
}

.language-toggle .lang-btn:hover {
  background: #e0e0e0;
  color: #333;
}

.language-toggle .lang-btn.active {
  background: #007bff;
  color: white;
  font-weight: 600;
}
</style>
