<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Registration | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/i18n.css" />
    <script defer src="/js/register.js"></script>
    <script defer src="/js/i18n.js"></script>
    <script defer src="/js/theme.js"></script>
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel registration-public-panel" aria-labelledby="register-title">
        <div>
          <p class="eyebrow">New registration</p>
          <h1 id="register-title">Join the academy.</h1>
          <p class="summary compact" id="registration-window-message">
            Checking registration window.
          </p>
          <a class="secondary-link" href="/login">Back to login</a>
        </div>

        <form class="login-form" id="public-registration-form" enctype="multipart/form-data">
          <div class="alert" id="public-registration-alert" hidden></div>

          <input type="hidden" name="applicantType" value="Parent" />
          <input type="hidden" name="course" value="Math with Miss Hoda Ismail" />

          <label for="studentName">Student name</label>
          <input id="studentName" name="studentName" required />

          <label for="parentWhatsapp">Parent WhatsApp number</label>
          <input id="parentWhatsapp" name="parentWhatsapp" required />

          <label for="studentWhatsapp">Student WhatsApp number</label>
          <input id="studentWhatsapp" name="studentWhatsapp" required />

          <label for="prizePhone">Prize transfer phone</label>
          <input
            id="prizePhone"
            name="prizePhone"
            required
            placeholder="Number we send monthly rewards to"
          />

          <label for="email">Email <span class="optional-label">optional</span></label>
          <input id="email" name="email" type="email" placeholder="Only if you want updates by email" />

          <label for="schoolGrade">Grade</label>
          <select id="schoolGrade" name="schoolGrade">
            <option>Grade 4</option>
            <option>Grade 5</option>
            <option>Grade 6</option>
            <option>Prep 1</option>
            <option>Prep 2</option>
          </select>

          <label for="studentPhoto">Student photo <span class="optional-label">optional</span></label>
          <input id="studentPhoto" name="studentPhoto" type="file" accept="image/*" />

          <label for="accountPassword">Choose password</label>
          <input
            id="accountPassword"
            name="accountPassword"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <label for="confirmPassword">Confirm password</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />

          <button type="submit">Submit reservation request</button>
          <p class="form-message" id="public-registration-message"></p>
        </form>
      </section>
    </main>
  </body>
</html>
