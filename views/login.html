<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/i18n.css" />
    <script defer src="/js/login.js"></script>
    <script defer src="/js/i18n.js"></script>
    <script defer src="/js/theme.js"></script>
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-panel login-panel" aria-labelledby="login-title">
        <div>
          <h1 class="visually-hidden" id="login-title">Sign in</h1>
        </div>

        <form class="login-form" action="/login" method="post">
          <div class="alert" id="login-error" hidden>
            The code, phone, email, or password is incorrect.
          </div>

          <label for="identifier">Student code / phone / email</label>
          <input
            id="identifier"
            name="email"
            type="text"
            autocomplete="username"
            value="admin@academy.test"
            required
          />

          <label for="loginRole">Sign in as</label>
          <select id="loginRole" name="loginRole">
            <option value="Staff">Admin / Teacher</option>
            <option value="Student">Student</option>
            <option value="Parent">Parent</option>
          </select>

          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            value="password123"
            required
          />

          <button type="submit">Sign in</button>
          <a class="secondary-link auth-register-link" href="/register">New student / parent registration</a>

          <div class="demo-users" aria-label="Demo accounts">
            <p>Demo accounts</p>
            <button type="button" data-demo-email="admin@academy.test" data-demo-role="Staff">Admin</button>
            <button type="button" data-demo-email="teacher@academy.test" data-demo-role="Staff">Teacher</button>
            <button type="button" data-demo-email="parent@academy.test" data-demo-role="Parent">Parent</button>
            <button type="button" data-demo-email="student@academy.test" data-demo-role="Student">Student</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
