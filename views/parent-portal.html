<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent Portal | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script defer src="/js/parent-portal.js"></script>
    <script defer src="/js/theme.js"></script>
  </head>
  <body>
    <main class="dashboard parent-portal-page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Parent portal</p>
          <h1>My Children</h1>
          <p class="page-intro">
            Follow each child’s corrected answers, grades, feedback, and progress from one place.
          </p>
        </div>
        <div class="toolbar-actions">
          <a class="secondary-link" href="/dashboard">Dashboard</a>
          <form action="/logout" method="post">
            <button class="secondary-button" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <section class="records-panel" aria-labelledby="children-title">
        <div class="records-header">
          <div>
            <p class="eyebrow">Children results</p>
            <h2 id="children-title">Choose a child</h2>
          </div>
          <div class="child-tabs" id="child-tabs"></div>
        </div>
        <div class="parent-child-results" id="parent-child-results"></div>
      </section>

      <section class="records-panel quiz-late-panel" aria-labelledby="parent-support-title">
        <div class="records-header">
          <div>
            <p class="eyebrow">Support</p>
            <h2 id="parent-support-title">Send a message</h2>
          </div>
        </div>
        <form class="data-form support-submit-form" id="parent-support-form">
          <label for="senderName">Your name</label>
          <input id="senderName" name="senderName" placeholder="Parent name" required />

          <label for="studentName">Student name</label>
          <input id="studentName" name="studentName" placeholder="Student name" />

          <label for="category">Category</label>
          <select id="category" name="category">
            <option>Session question</option>
            <option>Grade question</option>
            <option>Technical support</option>
            <option>Group access</option>
          </select>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="3" required></textarea>

          <button type="submit">Send to support</button>
          <p class="form-message" id="parent-support-message"></p>
        </form>
      </section>

      <section class="records-panel quiz-late-panel" aria-labelledby="parent-message-archive-title">
        <div class="records-header">
          <div>
            <p class="eyebrow">Message archive</p>
            <h2 id="parent-message-archive-title">Previous conversations</h2>
          </div>
        </div>
        <div class="support-list" id="parent-message-archive"></div>
      </section>
    </main>
  </body>
</html>
