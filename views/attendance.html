<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script defer src="/js/attendance.js"></script>
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div>
          <p class="eyebrow">Zoom webinar attendance</p>
          <h1>Upload chat attendance</h1>
          <p class="page-intro">
            Select the grade, upload the Zoom chat text file, and AMS will mark attendance only for matching codes in that grade.
          </p>
        </div>
        <div class="toolbar-actions">
          <a class="secondary-link" href="/dashboard">Dashboard</a>
          <form action="/logout" method="post">
            <button class="secondary-button" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <section class="management-layout">
        <form class="data-form" id="attendance-form">
          <div>
            <p class="eyebrow">New session</p>
            <h2>Chat file</h2>
          </div>
          <label for="sessionTitle">Session title</label>
          <input id="sessionTitle" name="sessionTitle" value="Zoom Webinar - Session 1" required />

          <label for="schoolGrade">Grade</label>
          <select id="schoolGrade" name="schoolGrade" required></select>

          <label for="zoomChat">Zoom chat .txt file</label>
          <input id="zoomChat" name="zoomChat" type="file" accept=".txt,text/plain" required />

          <button type="submit">Upload and mark attendance</button>
          <p class="form-message" id="attendance-message"></p>
        </form>

        <section class="records-panel" aria-labelledby="attendance-results-title">
          <div class="records-header">
            <div>
              <p class="eyebrow">Result</p>
              <h2 id="attendance-results-title">Attendance review</h2>
            </div>
          </div>
          <div class="attendance-results" id="attendance-results">
            <p class="empty-state">Upload a Zoom chat file to see who is present and who is absent.</p>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
