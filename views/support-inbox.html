<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Inbox | Academy Management System</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/i18n.css" />
    <script defer src="/js/support-inbox.js"></script>
    <script defer src="/js/i18n.js"></script>
    <script defer src="/js/theme.js"></script>
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div>
          <p class="eyebrow">Internal communication</p>
          <h1>Support Inbox</h1>
          <p class="page-intro">
            Review parent/student questions, route them to the right person, and approve AI suggestions before sending.
          </p>
        </div>
        <div class="toolbar-actions">
          <a class="secondary-link" href="/dashboard">Dashboard</a>
          <form action="/logout" method="post">
            <button class="secondary-button" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <section class="records-panel" aria-labelledby="support-flow-title">
        <div class="records-header">
          <div>
            <p class="eyebrow">Support scenarios</p>
            <h2 id="support-flow-title">Add custom flow for Miss Hoda</h2>
          </div>
        </div>
        <form class="data-form" id="support-flow-form">
          <label for="flowTitle">Scenario title</label>
          <input id="flowTitle" name="title" placeholder="Homework policy question" required />

          <label for="flowCategory">Category</label>
          <select id="flowCategory" name="category">
            <option>Session question</option>
            <option>Grade question</option>
            <option>Technical support</option>
            <option>Group access</option>
            <option>Payments</option>
          </select>

          <label for="flowJson">Flow JSON</label>
          <textarea id="flowJson" name="flowJson" rows="8" required>{
  "start": {
    "text": "Write the first question here.",
    "options": [
      { "label": "Yes", "next": "yes" },
      { "label": "No", "next": "no" }
    ]
  },
  "yes": { "resolution": "Write the answer for yes here." },
  "no": { "resolution": "Write the answer for no here. If this needs a person, ask them to leave a message." }
}</textarea>

          <button type="submit">Add scenario</button>
          <p class="form-message" id="support-flow-message"></p>
        </form>
      </section>

      <section class="records-panel" aria-labelledby="support-title">
        <div class="records-header">
          <div>
            <p class="eyebrow">Repeated questions</p>
            <h2 id="support-title">Messages needing reply</h2>
          </div>
          <div class="score-legend">
            <span>AI suggests only</span>
            <span>Human approves</span>
          </div>
        </div>
        <div class="support-list" id="support-list"></div>
      </section>
    </main>
  </body>
</html>
